<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <style>
        body {
            font-family: Quicksand, sans-serif;
            background-color: #f8d7da;
            color: #721c24;
            padding: 40px;
        }
        .error-box {
            background-color: #f5c6cb;
            border: 1px solid #f1b0b7;
            padding: 20px;
            border-radius: 8px;
        }
        a {
            color: #721c24;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <h2>⚠️ Something went wrong!</h2>
        <p>{{ error }}</p>
        <p><a href="/">🔁 Try Again</a></p>
    </div>
</body>
</html>
